<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">LOGRUS simplified MVP dashboard</title>
  <desc id="desc">Minimal professional MVP dashboard for analyzing public governance events and regulatory changes from open sources.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.55" stop-color="#334155"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .bg { fill: #f6f7f9; }
      .panel { fill: #fff; stroke: #e2e8f0; stroke-width: 1; }
      .mutedPanel { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .ink { fill: #0f172a; }
      .muted { fill: #64748b; }
      .soft { fill: #94a3b8; }
      .line { stroke: #e2e8f0; stroke-width: 1; }
      .h1 { font-size: 26px; font-weight: 760; letter-spacing: 0; }
      .h2 { font-size: 17px; font-weight: 700; letter-spacing: 0; }
      .body { font-size: 13px; letter-spacing: 0; }
      .small { font-size: 11px; letter-spacing: 0; }
      .tiny { font-size: 10px; letter-spacing: 0; }
      .badge { fill: #ecfdf5; stroke: #99f6e4; stroke-width: 1; }
      .badgeText { fill: #0f766e; font-weight: 700; }
      .warn { fill: #fffbeb; stroke: #fde68a; stroke-width: 1; }
      .warnText { fill: #a16207; font-weight: 700; }
      .blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1; }
      .blueText { fill: #1d4ed8; font-weight: 700; }
    </style>
  </defs>

  <rect width="1440" height="900" class="bg"/>

  <g class="sans" filter="url(#shadow)">
    <rect x="80" y="54" width="1280" height="792" rx="14" fill="#fff" stroke="#cbd5e1"/>
  </g>

  <g class="sans">
    <!-- Header -->
    <rect x="80" y="54" width="1280" height="76" rx="14" fill="#fff"/>
    <line x1="80" y1="130" x2="1360" y2="130" class="line"/>

    <g transform="translate(112 76)">
      <rect x="0" y="0" width="38" height="38" rx="8" fill="#0f172a"/>
      <path d="M10 22 C16 8, 28 8, 27 17 C26 25, 14 20, 16 29 C18 36, 31 31, 29 20" fill="none" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
      <circle cx="10" cy="22" r="2.3" fill="#14b8a6"/>
      <circle cx="27" cy="17" r="2.3" fill="#f59e0b"/>
      <text x="52" y="17" class="ink" font-size="18" font-weight="780">ЛОГРУС</text>
      <text x="52" y="35" class="muted small">Локатор открытых государственных, регуляторных и управленческих событий</text>
    </g>

    <g transform="translate(928 76)">
      <rect x="0" y="0" width="112" height="36" rx="8" class="mutedPanel"/>
      <text x="23" y="23" class="ink body" font-weight="650">Сегодня</text>
      <rect x="126" y="0" width="132" height="36" rx="8" fill="#0f172a"/>
      <text x="152" y="23" fill="#fff" class="body" font-weight="700">Обновить</text>
      <circle cx="288" cy="18" r="5" fill="#10b981"/>
      <text x="302" y="23" class="muted body">online</text>
    </g>

    <!-- Page title -->
    <g transform="translate(112 172)">
      <text x="0" y="0" class="ink h1">Сводка открытых событий</text>
      <text x="0" y="28" class="muted body">Короткий ежедневный обзор: что произошло, что появилось в документах и почему это связано.</text>
    </g>

    <!-- Core stats -->
    <g transform="translate(112 236)">
      <rect x="0" y="0" width="256" height="90" rx="10" class="panel"/>
      <text x="20" y="30" class="muted small" font-weight="700">Новые материалы</text>
      <text x="20" y="65" class="ink" font-size="28" font-weight="780">173</text>
      <text x="168" y="60" class="muted small">за 24 часа</text>

      <rect x="280" y="0" width="256" height="90" rx="10" class="panel"/>
      <text x="300" y="30" class="muted small" font-weight="700">Важные события</text>
      <text x="300" y="65" class="ink" font-size="28" font-weight="780">9</text>
      <rect x="352" y="43" width="76" height="24" rx="12" class="badge"/>
      <text x="369" y="59" class="badgeText tiny">важные</text>

      <rect x="560" y="0" width="256" height="90" rx="10" class="panel"/>
      <text x="580" y="30" class="muted small" font-weight="700">Требуют проверки</text>
      <text x="580" y="65" class="ink" font-size="28" font-weight="780">3</text>
      <rect x="632" y="43" width="86" height="24" rx="12" class="warn"/>
      <text x="649" y="59" class="warnText tiny">medium</text>

      <rect x="840" y="0" width="408" height="90" rx="10" class="panel"/>
      <text x="860" y="30" class="muted small" font-weight="700">Источники в MVP</text>
      <text x="860" y="61" class="ink body" font-weight="650">Речь · Документы · Статистика · Госзакупки</text>
    </g>

    <!-- Main layout -->
    <g transform="translate(112 356)">
      <!-- Left list -->
      <rect x="0" y="0" width="472" height="428" rx="10" class="panel"/>
      <text x="22" y="34" class="ink h2">Главные события</text>
      <text x="22" y="58" class="muted body">Минимальная лента для ручной аналитической проверки.</text>
      <line x1="0" y1="80" x2="472" y2="80" class="line"/>

      <g transform="translate(18 102)">
        <rect x="0" y="0" width="436" height="86" rx="9" fill="#f8fafc" stroke="#cbd5e1"/>
        <rect x="18" y="16" width="104" height="24" rx="12" class="warn"/>
        <text x="34" y="32" class="warnText tiny">Регулирование</text>
        <text x="18" y="60" class="ink body" font-weight="700">Налоговая “донастройка” стала повторяющейся формулой</text>
        <text x="360" y="32" class="mono muted tiny">0.82</text>

        <rect x="0" y="104" width="436" height="86" rx="9" fill="#fff" stroke="#e2e8f0"/>
        <rect x="18" y="120" width="70" height="24" rx="12" class="badge"/>
        <text x="35" y="136" class="badgeText tiny">ОПК</text>
        <text x="18" y="164" class="ink body" font-weight="700">Закупки подтверждают рост промышленного приоритета</text>
        <text x="360" y="136" class="mono muted tiny">0.76</text>

        <rect x="0" y="208" width="436" height="86" rx="9" fill="#fff" stroke="#e2e8f0"/>
        <rect x="18" y="224" width="104" height="24" rx="12" class="blue"/>
        <text x="34" y="240" class="blueText tiny">Расхождение</text>
        <text x="18" y="268" class="ink body" font-weight="700">Мягкая риторика не совпала с проверочной активностью</text>
        <text x="360" y="240" class="mono muted tiny">0.69</text>
      </g>

      <!-- Selected marker -->
      <rect x="500" y="0" width="748" height="428" rx="10" class="panel"/>
      <text x="522" y="34" class="ink h2">Выбранное событие</text>
      <text x="522" y="58" class="muted body">Показываем только вывод, основание и ссылки на факты.</text>
      <line x1="500" y1="80" x2="1248" y2="80" class="line"/>

      <g transform="translate(522 108)">
        <rect x="0" y="0" width="704" height="92" rx="10" fill="#0f172a"/>
        <text x="22" y="34" fill="#fff" font-size="18" font-weight="750">Вероятна подготовка налогового регулирования</text>
        <text x="22" y="62" fill="#cbd5e1" class="body">Вывод основан на совпадении риторики Минфина, проекта НПА и бюджетной логики.</text>
        <text x="608" y="34" fill="#99f6e4" class="mono small" font-weight="700">conf 0.82</text>
      </g>

      <g transform="translate(522 228)">
        <text x="0" y="0" class="muted small" font-weight="700">ОСНОВАНИЯ</text>
        <line x1="12" y1="24" x2="12" y2="128" stroke="#cbd5e1" stroke-width="1.5"/>
        <circle cx="12" cy="24" r="5" fill="#0f766e"/>
        <text x="32" y="29" class="ink body" font-weight="700">Прямая речь</text>
        <text x="148" y="29" class="muted body">повторена формула “точечная настройка”</text>
        <circle cx="12" cy="76" r="5" fill="#b45309"/>
        <text x="32" y="81" class="ink body" font-weight="700">Документ</text>
        <text x="148" y="81" class="muted body">появился проект поправок с близкой терминологией</text>
        <circle cx="12" cy="128" r="5" fill="#1d4ed8"/>
        <text x="32" y="133" class="ink body" font-weight="700">Контекст</text>
        <text x="148" y="133" class="muted body">бюджетные показатели усиливают фискальную мотивацию</text>

        <path d="M506 24 C548 6, 604 10, 650 48 C684 76, 668 112, 704 128" fill="none" stroke="url(#signal)" stroke-width="2.6" stroke-linecap="round"/>
        <circle cx="506" cy="24" r="8" fill="#0f766e"/>
        <circle cx="650" cy="48" r="8" fill="#334155"/>
        <circle cx="704" cy="128" r="8" fill="#b45309"/>
      </g>
    </g>
  </g>
</svg>
